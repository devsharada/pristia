<!-- Hamburger Button for Mobile/Tablet (This would typically go in your application's header/navbar) -->
<!-- You must place this element outside of the sidebar block for users to open it -->
<button (click)="toggleSidebar()" class="p-2 fixed top-4 left-4 z-[60] lg:hidden bg-blue-800 text-white rounded-md shadow-lg">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="isSidebarOpen ? 'M6 18L18 6M6 6l12 12' : 'M4 6h16M4 12h16m-7 6h7'"></path>
    </svg>
</button>

<!-- Mobile/Tablet Backdrop (Overlay that appears when menu is open, closes menu on click) -->
<div *ngIf="isSidebarOpen" (click)="isSidebarOpen = false"
     class="fixed inset-0 bg-black bg-opacity-50 z-40 transition-opacity duration-300 ease-in-out lg:hidden">
</div>

<!-- Main Sidebar Container (Fixed Layout for Desktop, Slide-out Drawer for Mobile/Tablet) -->
<div [ngClass]="{'translate-x-0': isSidebarOpen}"
     class="fixed top-0 left-0 h-screen bg-white flex flex-col p-2 text-gray-700 text-sm
            z-50 transition-transform duration-300 ease-in-out
            w-64 transform -translate-x-full
            lg:w-60 lg:translate-x-0
            ">

    <!-- Profile/Account Selector (Kept from previous) -->
    <div class="p-3 mb-2 rounded-lg border border-dashed border-gray-300 flex items-center justify-between cursor-pointer hover:bg-gray-50">
        <div class="flex items-center">
            <!-- Logo/Avatar Placeholder -->
            <div class="w-7 h-7 bg-black rounded-full mr-3 flex items-center justify-center border border-yellow-500">
                <span class="text-xs font-bold text-yellow-500">G</span>
            </div>
            <span class="font-medium text-gray-800">Rohan (admin)</span>
        </div>
        <!-- Toggle Icon (Image Placeholder) -->
        <img src="https://cdn-icons-png.flaticon.com/128/7693/7693521.png" alt="Toggle" class="h-4 w-4 text-gray-500" />
    </div>

    <!-- Navigation Menu (TOP SECTION) -->
    <nav class="flex-grow p-1 overflow-y-auto">
        <ul class="space-y-1">

            <!-- 1. Home - Direct Link -->
            <li>
                <a routerLink="/admin/home" routerLinkActive="bg-032b76 text-white font-medium" [routerLinkActiveOptions]="{exact: true}"
                    (click)="closeSidebar()"
                    class="flex items-center p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                    [class.hover:bg-gray-100]="!isRouteActive('/admin/home')">
                    <img src="https://cdn-icons-png.flaticon.com/128/1946/1946488.png" alt="Home Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-home')">
                    <span>Home</span>
                </a>
            </li>

            <!-- 2. Sales - Direct Link -->
            <li>
                <a routerLink="/admin/sales" routerLinkActive="bg-032b76 text-white font-medium" [routerLinkActiveOptions]="{exact: true}"
                    (click)="closeSidebar()"
                    class="flex items-center p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                    [class.hover:bg-gray-100]="!isRouteActive('/admin/sales')">
                    <img src="https://cdn-icons-png.flaticon.com/128/9219/9219671.png" alt="Sales Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-sales')">
                    <span>Sales</span>
                </a>
            </li>

            <!-- 3. Order - Direct Link (Path corrected to admin-orders) -->
            <li>
                <a routerLink="/admin/orders" routerLinkActive="bg-032b76 text-white font-medium" [routerLinkActiveOptions]="{exact: true}"
                   (click)="closeSidebar()"
                   class="flex items-center p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                   [class.hover:bg-gray-100]="!isRouteActive('/admin/orders')">
                    <img src="https://cdn-icons-png.flaticon.com/128/839/839860.png" alt="Order Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-orders')">
                    <span>Order</span>
                </a>
            </li>

            <!-- 4. Product - Toggleable Parent (WITH SUB-COMPONENTS) -->
            <li>
                <div (click)="onProductsClick()"
                     class="cursor-pointer flex items-center p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                     [ngClass]="{
                        'bg-blue-800 text-white font-medium hover:!bg-032b76': isMenuActive('/admin/products'),
                        'bg-gray-200': openMenu === 'products' && !isMenuActive('/admin/products'),
                        'hover:bg-gray-100': !isMenuActive('/admin/products')
                     }">
                    <div class="flex items-center justify-between w-full">
                        <span class="flex items-center">
                            <img src="https://cdn-icons-png.flaticon.com/128/2900/2900216.png" alt="Product Icon" class="h-5 w-5 mr-3" [class.white-icon]="isMenuActive('/admin/admin-products')">
                            <span class="ml-0">Product</span>
                        </span>
                        <!-- Down/Up Arrow Placeholder (Included to support expand/collapse visual) -->
                        <!-- <img src="assets/icons/arrow-down.png" alt="Toggle" class="h-3 w-3 transition-transform duration-200"
                            [ngClass]="{'rotate-180': openMenu === 'products', 'white-icon': isMenuActive('/admin/admin-products')}"> -->
                    </div>
                </div>

                <!-- Product Sub-components (Paths corrected) -->
                <ul *ngIf="openMenu === 'products'" class="pl-8 mt-1 space-y-1">
                    <li>
                        <a routerLink="/admin/product-collection-occasion" routerLinkActive="font-bold bg-gray-200" (click)="closeSidebar()" class="block p-2 rounded-md hover:bg-gray-200">Collection/ Occasion</a>
                    </li>
                    <li>
                        <a routerLink="/admin/product-tracking" routerLinkActive="font-bold bg-gray-200" (click)="closeSidebar()" class="block p-2 rounded-md hover:bg-gray-200">Product Tracking</a>
                    </li>
                </ul>
            </li>

            <!-- 5. Market - Direct Link (Path corrected to admin-markets) -->
            <li>
                <a routerLink="/admin/markets" routerLinkActive="bg-032b76 text-white font-medium" [routerLinkActiveOptions]="{exact: true}"
                   (click)="closeSidebar()"
                   class="flex items-center p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                   [class.hover:bg-gray-100]="!isRouteActive('/admin/markets')">
                    <img src="https://cdn-icons-png.flaticon.com/128/6797/6797554.png" alt="Market Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-markets')">
                    <span>Market</span>
                </a>
            </li>

            <!-- 6. Analytics - Direct Link -->
            <li>
                <a routerLink="/admin/analytics" routerLinkActive="bg-032b76 text-white font-medium" [routerLinkActiveOptions]="{exact: true}"
                   (click)="closeSidebar()"
                   class="flex items-center p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                   [class.hover:bg-gray-100]="!isRouteActive('/admin/analytics')">
                    <img src="https://cdn-icons-png.flaticon.com/128/738/738559.png" alt="Analytics Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-analytics')">
                    <span>Analytics</span>
                </a>
            </li>

            <!-- 7. Online Store Pages - Direct Link with count -->
            <li>
                <a routerLink="/admin/online-store-pages" routerLinkActive="bg-032b76 text-white font-medium" [routerLinkActiveOptions]="{ exact: true }"
                   (click)="closeSidebar()"
                   class="flex items-center justify-between p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
                   [class.hover:bg-gray-100]="!isRouteActive('/admin/online-store-pages')">
                    <div class="flex items-center">
                        <img src="https://cdn-icons-png.flaticon.com/128/511/511587.png" alt="Store Pages Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/online-store-pages')">
                        <span>Online Store Pages</span>
                    </div>
                    <!-- Count 342 -->
                    <span class="text-xs font-semibold text-gray-500" [class.text-white]="isRouteActive('/admin/online-store-pages')">342</span>
                </a>
            </li>

        </ul>

          <!-- Visual Separator (Reduced vertical space to my-1) -->
    <div class="h-px mx-2 my-1 border-b border-dotted border-gray-300"></div>

           <ul class="space-y-1 p-1 mb-10">

        <!-- 8. Setting - Direct Link with count (Assuming /admin/admin-settings) -->
        <li>
            <a routerLink="/admin/settings" routerLinkActive="bg-blue-800 text-white font-medium"
               (click)="closeSidebar()"
               class="flex items-center justify-between p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
               [class.hover:bg-gray-100]="!isRouteActive('/admin/settings')">
                <div class="flex items-center">
                    <img src="https://cdn-icons-png.flaticon.com/128/2040/2040504.png" alt="Setting Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-settings')">
                    <span>Setting</span>
                </div>
                <!-- Count 128 -->
                <span class="text-xs font-semibold text-gray-500" [class.text-white]="isRouteActive('/admin/admin-settings')">128</span>
            </a>
        </li>

        <!-- 9. Notification - Direct Link with count (Assuming /admin/admin-notifications) -->
        <li>
            <a routerLink="/admin/notifications" routerLinkActive="bg-blue-800 text-white font-medium"
               (click)="closeSidebar()"
               class="flex items-center justify-between p-3 rounded-lg transition-colors duration-200 text-gray-800 hover:bg-gray-100"
               [class.hover:bg-gray-100]="!isRouteActive('/admin/notifications')">
                <div class="flex items-center">
                    <img src="https://cdn-icons-png.flaticon.com/128/2645/2645897.png" alt="Notification Icon" class="h-5 w-5 mr-3" [class.white-icon]="isRouteActive('/admin/admin-notifications')">
                    <span>Notification</span>
                </div>
                <!-- Count 8 -->
                <span class="text-xs font-semibold text-gray-500" [class.text-white]="isRouteActive('/admin/admin-notifications')">8</span>
            </a>
        </li>
    </ul>
    </nav>
</div>

<!-- Global Style for Icon Color Inversion (for active state) -->
<style>
    .white-icon {
        filter: invert(100%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(100%) contrast(100%);
    }
</style>
