    type="text"
    placeholder="Search..."

    <!-- Header -->
     <h1 class="text-2xl font-bold mb-6">Add Product</h1>

    <!-- Top Navigation/Filter Bar -->
     <!-- Filter Bar (Kept outside the grid) -->
    <div class="flex justify-between items-center mb-6 py-2">
        <div class="flex items-center space-x-3 text-sm rounded-md bg-[#FFFFFF] p-2">
            <button class=" bg-032b76 text-white px-4 py-1.5 rounded-lg font-medium shadow-md">Last 30 Days</button>
            <span class="text-gray-600 flex items-center">
                Live Visitors
                <span class="w-2 h-2 bg-[#25C470] rounded-full ml-2 mr-1 animate-pulse"></span>
                <span class="text-[#25C470] font-semibold">2.5k</span>
            </span>

   <div class="flex items-center space-x-3 text-sm">
<!-- Date Range Selector - Premium & Compact -->
<div class="flex items-center p-2 bg-white rounded-lg border border-gray-300">
  <!-- Calendar Icon -->
  <svg class="w-4 h-4 text-gray-500 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
    xmlns="http://www.w3.org/2000/svg">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
  </svg>

  <!-- Start Date Input -->
  <input type="date"
    class="appearance-none bg-transparent border-none focus:ring-0 text-gray-800 text-sm font-medium p-0 pr-0.5 w-28 cursor-pointer"
    value="2025-09-20" title="Select Start Date" />

  <!-- Separator -->
  <span class="text-gray-500 font-light mx-0.5">–</span>

  <!-- End Date Input -->
  <input type="date"
    class="appearance-none bg-transparent border-none focus:ring-0 text-gray-800 text-sm font-medium p-0 pl-0.5 w-28 cursor-pointer"
    value="2025-10-09" title="Select End Date" />
</div>


<!-- Note: The appearance-none class is critical for removing the default date picker styling
     and making the input look more custom/premium across different browsers. -->
  <!-- Buttons -->
  <button class="bg-032b76 text-white px-4 py-1.5 rounded-lg font-medium shadow-md">
    Apply
  </button>
  <button class="text-032b76 px-4 py-1.5 rounded-lg font-medium hover:bg-blue-50">
    Clear Filter
  </button>
</div>

    </div>

    <!-- Main Content Card -->
    <div class="bg-white p-6 rounded-lg shadow-xl border-[1px] border-[#C0CEF8]">

        <!-- Jeweller Header and Breadcrumb -->
        <h2 class="text-lg font-medium mb-1 text-gray-700">Jeweller <span class="text-xs align-top">Ⓒ</span></h2>

        <!-- Main Two-Column Layout -->
        <div class="flex flex-col lg:flex-row gap-8">

            <!-- Left Column - Forms -->
            <div class="flex-1 space-y-6">

                <!-- Product Details Section -->
                <div class="space-y-3">
                    <h3 class=" font-medium text-lg flex items-center mb-4 pb-2">
                        Product Details
                        <span class="ml-2">→</span>
                    </h3>

                    <!-- Input Grid Container - Using margin-bottom on divs to simulate custom spacing -->
                    <div>
                        <!-- Row 1: Product Name, Category, Product Code (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <input type="text" placeholder="Product Name" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Category" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Product Code" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 2: Model No., Firm, Gender, HUID (4 Cols) -->
                        <div class="grid grid-cols-4 gap-3 mb-3">
                            <input type="text" placeholder="Model No." class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Firm" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Gender" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="HUID" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 3: Metal Type, Size, Color (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <input type="text" placeholder="Metal Type" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Size" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Color" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 4: Length, Quality, SKU, Qty (4 Cols) -->
                        <div class="grid grid-cols-4 gap-3 mb-3">
                            <input type="text" placeholder="Length" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Quality" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="SKU" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Qty" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 5: Description (Full Width) -->
                        <textarea placeholder="Description" rows="2" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md w-full placeholder:text-gray-400"></textarea>
                    </div>
                </div>

                <!-- Weight & Purity Details Section -->
                <div class="space-y-3 pt-4">
                    <h3 class=" font-medium text-lg flex items-center mb-4 pb-2">
                        Weight & Purity Details
                        <span class="ml-2">→</span>
                    </h3>

                    <div>
                        <!-- Row 1: Gross Wt, Less Wt, Pkg Wt (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <input type="text" placeholder="Gross Wt" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Less Wt" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Pkg Wt" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 2: Net Wt, Purity, Final Purity (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <input type="text" placeholder="Net Wt" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Purity" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Final Purity" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 3: Wastage, Customer Wastage, Crystal Wt (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" placeholder="Wastage" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Customer Wastage" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Crystal Wt" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                    </div>
                </div>

                <!-- Chargers Details Section -->
                <div class="space-y-3 pt-4">
                    <h3 class="font-medium text-lg flex items-center mb-4 pb-2">
                        Chargers Details
                        <span class="ml-2">→</span>
                    </h3>

                    <div>
                        <!-- Row 1: Rate, Mkg Charge, Mkg Charge Type (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3 mb-3">
                            <input type="text" placeholder="Rate" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Mkg Charge" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Mkg Charge Type" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                        <!-- Row 2: Labour Charge, Valuation, Final Valuation (3 Cols) -->
                        <div class="grid grid-cols-3 gap-3">
                            <input type="text" placeholder="Labour Charge" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Valuation" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                            <input type="text" placeholder="Final Valuation" class="border-[1px] border-[#E4E7ED] p-3 text-sm rounded-md placeholder:text-gray-400">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column - Gallery -->
            <div class="w-full lg:w-96 space-y-6">

                <!-- Main Product Image (Placeholder) -->
                <div class="rounded-lg overflow-hidden border-[1px] border-[#C0CEF8] shadow-md h-96 flex items-center justify-center bg-gray-50 p-2">
                    <!-- Placeholder for the gold ring image -->
                    <svg viewBox="0 0 400 400" class="w-full h-full object-contain">
                        <defs>
                            <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
                                <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <!-- Abstract ring shape approximation to match the image angle -->
                        <path d="M 200 80 C 250 10, 350 180, 200 350 C 150 380, 50 200, 200 80" fill="none" stroke="url(#goldGradient)" stroke-width="40" stroke-linecap="round"/>
                        <path d="M 200 80 C 250 10, 350 180, 200 350" fill="none" stroke="#B8860B" stroke-width="4" stroke-linecap="round"/>
                    </svg>
                </div>


             <!-- Product Gallery Section -->
<div class="space-y-4">
    <!-- Section Header: Product Gallery -->
    <h3 class="text-[#153372] font-semibold text-lg flex items-center mb-3">
        Product Gallery
        <span class="ml-2">→</span>
    </h3>

    <!-- Dropzone (Replicated exactly) -->
    <div class="border-2 border-dashed border-gray-400 rounded-lg p-4 text-center text-gray-500 bg-white h-32 flex flex-col justify-center">
        <!-- Upload Icon Placeholder (simplified) -->
        <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="mt-1 text-sm">Drop your imager here, or <span class="text-[#032B76] font-medium cursor-pointer">browse</span></p>
        <p class="text-xs text-gray-400">Jpeg, png are allowed</p>
    </div>

    <!-- Thumbnails List -->
    <div class="space-y-3">
        <!-- Thumbnail Item (Repeat 4 times) -->
        <ng-container *ngFor="let i of [1,2,3,4]">
            <div class="flex items-center justify-between p-2 border border-gray-200 rounded-md bg-white shadow-sm hover:shadow-md transition duration-150">
                <div class="flex items-center">
                    <!-- Tiny Image Placeholder -->
                    <div class="w-10 h-10 bg-gray-100 rounded-sm mr-3 border border-gray-300 flex items-center justify-center">
                        <!-- Miniature gold ring placeholder -->
                        <svg viewBox="0 0 100 100" class="w-full h-full object-contain p-1">
                            <path d="M 50 20 C 65 5, 90 50, 50 80" fill="none" stroke="#DAA520" stroke-width="10" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="text-sm text-gray-700">Product thumbnail.png</span>
                </div>
                <!-- Checkmark Circle (EXACT MATCH to image: Light blue fill, dark blue check) -->
                <div class="w-5 h-5 rounded-full border-2 border-[#A8C4FF] flex items-center justify-center bg-[#E8F1FF]">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-[#032B76]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
            </div>
        </ng-container>
    </div>
</div>
            </div>
        </div>

        <!-- Footer Buttons -->
        <div class="flex justify-start pt-6 mt-6 border-t border-gray-200 space-x-4">
            <!-- DELETE Button -->
            <button class="px-8 py-2  bg-032b76 text-white font-medium rounded-md shadow-lg border-[1px] border-[#032B76] text-sm">DELETE</button>
            <!-- SUBMIT Button -->
            <button class="px-8 py-2 border-[2px] border-[#032B76] text-[#032B76] font-medium rounded-md bg-white shadow-lg text-sm">SUBMIT</button>
        </div>
    </div>
</div>
