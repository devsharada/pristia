<!-- product-collection-occasion.component.html -->

<div class="p-1 bg-gray-50 min-h-screen">

    <!-- HEADER STRUCTURE: Menu Icon Left, User Icon Right on Mobile -->
    <!-- CHANGE: Added flex-col on mobile, flex-row on small screens and up, space-y-4 for vertical stack on mobile -->
     <header class="flex justify-between items-center mb-6">

        <!-- Mobile Left Item (Sidebar/Menu Icon) - HIDDEN ON DESKTOP -->
        <button class="sm:hidden text-gray-500 hover:text-gray-800 p-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Search Bar: HIDDEN on mobile, original restricted width on sm and up -->
        <div class="hidden sm:flex items-center w-full max-w-sm bg-white border border-gray-300 rounded-full px-3 py-2 shadow-sm focus-within:border-gray-400 transition-all duration-200">
            <!-- Search Icon -->
            <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z"></path>
            </svg>
            <!-- Input Field -->
            <input
              type="text"
              placeholder="Search..."
              class="w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
            />
        </div>

        <!-- User Profile Area (Top Right on Mobile, Right on Desktop) -->
        <!-- Used 'flex items-center space-x-6' to ensure the original desktop layout remains -->
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 rounded-full overflow-hidden bg-gray-200 border border-gray-400">
                    <img src="https://cdn-icons-png.flaticon.com/128/4140/4140037.png" alt="User" class="object-cover w-full h-full" />
                </div>
                <!-- Hide the name on mobile, show on sm/desktop -->
                <span class="hidden sm:inline text-sm font-medium">(User)</span>
            </div>
        </div>
    </header>

    <!-- H1 (Desktop) / Mobile Title (New Position) -->
    <!-- Mobile: Aligns Title left, below the Menu Icon -->
    <h1 class="text-2xl font-bold mb-3 sm:mb-6 px-1 sm:px-0">
        <span class="block sm:hidden text-xl">Collection/Occasion</span>
        <span class="hidden sm:block">Collection/Occasion</span>
    </h1>

    <!-- Mobile-Only Search Bar (Full Width) -->
    <div class="sm:hidden flex items-center w-full bg-white border border-gray-300 rounded-full px-3 py-2 shadow-sm focus-within:border-gray-400 transition-all duration-200 mb-6 mt-[-10px]">
      <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z"></path>
      </svg>
      <input
        type="text"
        placeholder="Search..."
        class="w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
      />
    </div>

  <!-- Filter Bar -->
  <div class="w-full flex flex-col md:flex-row justify-between items-start md:items-center gap-2 mb-6 py-2 space-y-4 md:space-y-0">
    <div class="flex items-center space-x-3 text-sm rounded-md bg-[#FFFFFF] p-2">
      <button class=" bg-032b76 text-white px-2 xl:px-4 py-1.5 rounded-lg font-medium shadow-md">Last 30 Days</button>
      <span class="text-gray-600 flex items-center">
        Live Visitors
        <span class="w-2 h-2 bg-[#25C470] rounded-full ml-2 mr-1 animate-pulse"></span>
        <span class="text-[#25C470] font-semibold">2.5k</span>
      </span>
    </div>
    <!-- Responsive Date Range + Buttons -->
    <div class="w-full md:w-max sm:flex items-center gap-3 text-sm">

      <!-- Date Range Selector -->
      <div
        class="mb-2 sm:mb-0 flex items-center p-2 bg-white rounded-lg border border-gray-300 shadow-sm w-full sm:w-auto justify-center sm:justify-start">

        <!-- Start Date -->
        <input type="date"
          class="appearance-none bg-transparent border-none focus:ring-0 text-gray-800 text-sm font-medium p-0 pr-1 w-[90px] sm:w-28 cursor-pointer"
          value="2025-09-20" title="Select Start Date" />

        <span class="text-gray-500 font-light mx-1">–</span>

        <!-- End Date -->
        <input type="date"
          class="appearance-none bg-transparent border-none focus:ring-0 text-gray-800 text-sm font-medium p-0 pl-1 w-[90px] sm:w-28 cursor-pointer"
          value="2025-10-09" title="Select End Date" />
      </div>

      <!-- Buttons -->
      <div class="flex flex-wrap sm:flex-nowrap gap-2 w-full sm:w-auto justify-center sm:justify-start">
        <button class="bg-032b76 text-white px-4 py-1.5 rounded-lg font-medium shadow-md w-full sm:w-auto">
          Apply
        </button>
        <button class="text-032b76 py-1.5 rounded-lg font-medium hover:bg-blue-50 w-full sm:w-auto">
          Clear Filter
        </button>
      </div>
    </div>
  </div>

    <!-- Main Content Area -->
    <div class="bg-white p-4 rounded-lg shadow-xl border border-gray-200">

        <!-- Search and Action Bar (Made responsive to stack correctly on mobile) -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 space-y-4 sm:space-y-0">

            <!-- Left: Search Box (Full width on mobile, then margin) -->
            <div class="relative w-full sm:flex-grow sm:mr-4 order-1 sm:order-none">
                <!-- Added blue border to match image design, made full width on mobile -->
                <input type="text" placeholder="Search"
                    class="pl-4 pr-4 py-2 border border-gray-300 rounded-md text-sm w-full focus:outline-none focus:ring-1 focus:ring-032b76"
                    style="border-color: var(--neoPrimary);">
            </div>

            <!-- Right: Action Buttons (Mobile: Stacks on top of tabs, full width/wrapped) -->
            <div class="flex items-center gap-1 sm:gap-2 text-sm whitespace-nowrap justify-start sm:justify-end w-full sm:w-auto order-2 sm:order-none">

                <!-- Export, Filter -->
                <button
                    class="flex items-center px-2 md:px-3 py-1.5 border border-gray-300 rounded-md bg-white text-gray-700 hover:bg-gray-50 mb-2 sm:mb-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Export
                </button>
                <button
                    class="flex items-center px-2 md:px-3 py-1.5 border border-gray-300 rounded-md bg-white text-gray-700 hover:bg-gray-50 mb-2 sm:mb-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707v7l-4-4v-3.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                    </svg>
                    Filter
                </button>
                <!-- Add Product -->
                <button class="flex items-center px-2 md:px-3 py-1.5 bg-032b76 text-white rounded-md font-medium mb-2 sm:mb-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                    </svg>
                    Add Product
                </button>
            </div>
        </div>

        <!-- Tabs (Original Desktop: Inline) - On mobile, it needs to be full width below the buttons. -->
        <div class="flex flex-wrap space-x-3 mb-6 pt-2 border-b border-gray-200 text-md font-medium w-full">
            <!-- All Tab -->
            <button (click)="changeTab('all')" class="px-3 py-1 rounded-md transition-colors mb-2" [ngClass]="{
                        'bg-032b76 text-white': activeTab === 'all',
                        'text-gray-700 bg-gray-100 hover:bg-gray-200': activeTab !== 'all'
                    }">
                All
            </button>
            <!-- Collection Tab -->
            <button (click)="changeTab('collection')" class="px-3 py-1 rounded-md transition-colors mb-2" [ngClass]="{
                        'bg-032b76 text-white': activeTab === 'collection',
                        'text-gray-700 bg-gray-100 hover:bg-gray-200': activeTab !== 'collection'
                    }">
                Collection
            </button>
            <!-- Occasion Tab -->
            <button (click)="changeTab('occasion')" class="px-3 py-1 rounded-md transition-colors mb-2" [ngClass]="{
                        'bg-032b76 text-white': activeTab === 'occasion',
                        'text-gray-700 bg-gray-100 hover:bg-gray-200': activeTab !== 'occasion'
                    }">
                Occasion
            </button>
            <!-- Add New Tag Icon -->
            <button class="text-032b76 p-1 rounded-full hover:bg-gray-100 mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>
        </div>


        <!-- Table Structure (ALWAYS VISIBLE) -->
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <!-- Table Header -->
                <thead class="bg-white">
                    <tr class="text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        <!-- Min-widths added for horizontal scroll on mobile -->
                        <!-- Header Checkbox & Title -->
                        <th class="px-4 py-3 min-w-[150px]">
                            <div class="flex items-center space-x-2">
                                <input type="checkbox"
                                    class="h-4 w-4 rounded border-gray-300 text-032b76 focus:ring-032b76">
                                <span class="text-gray-700 font-semibold"># TITLE</span>
                            </div>
                        </th>
                        <!-- Product -->
                        <th class="px-4 py-3 min-w-[150px] text-gray-700 font-semibold">PRODUCT</th>
                        <!-- Product Condition -->
                        <th class="px-4 py-3 min-w-[180px] text-gray-700 font-semibold">PRODUCT CONDITION</th>
                        <!-- Blank Header -->
                        <th class="px-4 py-3 min-w-[50px] text-gray-700 font-semibold">-</th>
                    </tr>
                </thead>

                <!-- Table Body -->
                <!-- Table Body -->
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr *ngFor="let row of displayData" (click)="toggleSelection(row)"
                        class="text-sm cursor-pointer hover:bg-gray-50" [ngClass]="{'bg-blue-50': row.isChecked}">

                        <!-- Title Column -->
                        <td class="px-4 py-3 whitespace-nowrap text-gray-900">
                            <div class="flex items-center space-x-2">
                                <!-- Checkbox (ALWAYS VISIBLE AND CHECKBOX TYPE) -->
                                <input type="checkbox" [checked]="row.isChecked" (click)="toggleSelection(row)"
                                    class="h-4 w-4 rounded border-gray-300 text-032b76 focus:ring-032b76">

                                <span class="font-medium">
                                    {{ row.title }}
                                </span>
                            </div>
                        </td>

                        <!-- Product Count (Column 2) -->
                        <td class="px-4 py-3 whitespace-nowrap text-gray-700">
                            {{ row.count }}
                        </td>

                        <!-- Product Condition (Column 3) -->
                        <td class="px-4 py-3 whitespace-nowrap text-gray-700">
                            {{ row.productCondition }}
                        </td>

                        <!-- Blank Column (Column 4) -->
                        <td class="px-4 py-3 whitespace-nowrap text-gray-700">
                            ...
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

        <!-- Pagination Footer (Made responsive to stack on mobile) -->
        <div class="flex flex-col sm:flex-row justify-between items-center pt-4 mt-4 border-t border-gray-200 text-sm space-y-3 sm:space-y-0">

            <!-- Left: Selected Count -->
            <div class="text-gray-500">
                {{ totalRowsSelected }} of {{ totalRows }} row(s) selected.
            </div>

            <!-- Right: Pagination Controls (Made responsive) -->
            <div class="flex flex-col sm:flex-row items-center space-y-3 sm:space-y-0 sm:space-x-4">

                <!-- Rows Per Page Dropdown (Simulated) -->
                <div class="flex items-center space-x-2">
                    <span class="text-gray-700">Rows per page</span>
                    <select
                        class="px-2 py-1 border border-gray-300 rounded-md text-sm focus:ring-032b76 focus:border-032b76">
                        <option>8</option>
                        <option>10</option>
                        <option>25</option>
                    </select>
                </div>

                <!-- Page Info -->
                <div class="text-gray-700">
                    Page 1 of 10
                </div>

                <!-- Page Navigation Buttons -->
                <div class="flex space-x-1 text-gray-500">
                    <!-- First Page -->
                    <button class="p-1 border border-gray-300 rounded-md hover:bg-gray-100 disabled:opacity-50"
                        disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                        </svg>
                    </button>
                    <!-- Previous Page -->
                    <button class="p-1 border border-gray-300 rounded-md hover:bg-gray-100 disabled:opacity-50"
                        disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <!-- Next Page -->
                    <button class="p-1 border border-gray-300 rounded-md hover:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                    <!-- Last Page -->
                    <button class="p-1 border border-gray-300 rounded-md hover:bg-gray-100">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7m-8-14l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>
