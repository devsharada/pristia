<!-- ./online-store-pages.component.html -->
<div class="p-1 bg-white min-h-screen">

    <!-- HEADER STRUCTURE: Menu Icon Left, User Icon Right on Mobile. Desktop is ORIGINAL. -->
    <!-- CHANGE: Added flex-col on mobile, flex-row on small screens and up, space-y-4 for vertical stack on mobile -->
     <header class="flex justify-between items-center mb-6">

        <!-- Mobile Left Item (Sidebar/Menu Icon) - HIDDEN ON DESKTOP -->
        <button class="sm:hidden text-gray-500 hover:text-gray-800 p-2">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>

        <!-- Search Bar: HIDDEN on mobile, original restricted width on sm and up -->
        <div class="hidden sm:flex items-center w-full max-w-sm bg-white border border-gray-300 rounded-full px-3 py-2 shadow-sm focus-within:border-gray-400 transition-all duration-200">
            <!-- Search Icon -->
            <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z"></path>
            </svg>
            <!-- Input Field -->
            <input
              type="text"
              placeholder="Search..."
              class="w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none"
            />
        </div>

        <!-- User Profile Area (Top Right on Mobile, Right on Desktop) -->
        <!-- Used 'flex items-center space-x-6' to ensure the original desktop layout remains -->
        <div class="flex items-center space-x-6">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 rounded-full overflow-hidden bg-gray-200 border border-gray-400">
                    <img src="https://cdn-icons-png.flaticon.com/128/4140/4140037.png" alt="User" class="object-cover w-full h-full" />
                </div>
                <!-- Hide the name on mobile, show on sm/desktop -->
                <span class="hidden sm:inline text-sm font-medium">(User)</span>
            </div>
        </div>
    </header>

    <!-- H1 (Desktop) / Mobile Title (New Position) -->
    <h1 class="text-2xl font-bold mb-3 sm:mb-6 px-1 sm:px-0">
        <span class="block sm:hidden text-xl">Online Store Pages</span>
        <span class="hidden sm:block">Online Store Pages</span>
    </h1>

    <!-- Mobile-Only Search Bar (Full Width, with original styling) -->
    <div
        class="sm:hidden flex items-center w-full bg-white border border-gray-300 rounded-full px-3 py-2 shadow-sm focus-within:border-gray-400 transition-all duration-200 mb-6 mt-[-10px]">
        <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M10 18a8 8 0 100-16 8 8 0 000 16z">
            </path>
        </svg>
        <input type="text" placeholder="Search..."
            class="w-full bg-transparent text-sm text-gray-800 placeholder-gray-400 focus:outline-none" />
    </div>


    <!-- Top Filters and Actions Row (Made responsive to stack on mobile) -->
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 space-y-4 sm:space-y-0">
        <!-- Left Side: Timeframe/Channels/Visitors (Full width on mobile) -->
        <div class="flex items-center space-x-3 text-sm rounded-md bg-[#FFFFFF] p-2">
            <button class=" bg-032b76 text-white px-4 py-1.5 rounded-lg font-medium shadow-md">Last 30
                Days</button>
            <span class="text-gray-600 flex items-center">
                Live Visitors
                <span class="w-2 h-2 bg-[#25C470] rounded-full ml-2 mr-1 animate-pulse"></span>
                <span class="text-[#25C470] font-semibold">2.5k</span>
            </span>
        </div>

        <!-- Right Side: Date Picker and Actions (Made to stack/wrap neatly on mobile) -->
        <div
            class="flex flex-wrap sm:flex-nowrap items-start sm:items-center space-y-2 sm:space-y-0 sm:space-x-3 w-full sm:w-auto">
            <!-- Date Range Picker -->
            <div class="flex items-center p-2 bg-white rounded-lg border border-gray-300 w-full sm:w-auto">
                <!-- Calendar Icon -->
                <svg class="w-4 h-4 text-gray-500 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>

                <!-- Start Date Input (Reduced width on mobile) -->
                <input type="date"
                    class="appearance-none bg-transparent border-none focus:ring-0 text-gray-800 text-sm font-medium p-0 pr-0.5 w-20 sm:w-28 cursor-pointer"
                    value="2025-09-20" title="Select Start Date" />

                <!-- Separator -->
                <span class="text-gray-500 font-light mx-0.5">–</span>

                <!-- End Date Input (Reduced width on mobile) -->
                <input type="date"
                    class="appearance-none bg-transparent border-none focus:ring-0 text-gray-800 text-sm font-medium p-0 pl-0.5 w-20 sm:w-28 cursor-pointer"
                    value="2025-10-09" title="Select End Date" />
            </div>

            <!-- Export/Filter Buttons Group (Wrapped/Stacked on mobile) -->
            <div class="flex space-x-2 w-full sm:w-auto justify-end">
                <!-- Export Button -->
                <button
                    class="text-gray-700 text-sm font-medium px-3 py-2 border border-gray-300 rounded-lg bg-white flex items-center space-x-1 hover:bg-gray-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    <span>Export</span>
                </button>

                <!-- Filter Button -->
                <button
                    class="text-gray-700 text-sm font-medium px-3 py-2 border border-gray-300 rounded-lg bg-white flex items-center space-x-1 hover:bg-gray-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 12.414V16a1 1 0 01-1.554.832l-3-2A1 1 0 018 14v-1.586l-7.707-7.707A1 1 0 013 4z" />
                    </svg>
                    <span>Filter</span>
                </button>
            </div>

            <!-- More Action Dropdown Button (Dark Blue) -->
            <button
                class="bg-[#0A2C6C] text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm w-full sm:w-auto">More
                Action</button>

            <!-- Add Product Button (Dark Blue with Plus Icon) -->
            <button
                class="bg-[#0A2C6C] text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm flex items-center space-x-2 w-full sm:w-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Add Product</span>
            </button>
        </div>
    </div>


    <div>
        <!-- Search Input (Full width on mobile, w-64 on sm and up) -->
        <input type="text" placeholder="Search"
            class="w-full sm:w-64 pl-4 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-[#0A2C6C] focus:border-[#0A2C6C] shadow-sm">
    </div>

    <!-- Pages List Table -->
    <div class="bg-white rounded-xl shadow-md border border-gray-100 mt-4">
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <!-- Table Header -->
                <thead class="bg-gray-50 text-gray-500 text-sm font-medium">
                    <tr>
                        <!-- Min-widths added for horizontal scroll on mobile -->
                        <!-- Checkbox Column -->
                        <th class="py-3 px-4 min-w-[50px]">
                            <input type="checkbox" [checked]="isAllSelected()" (change)="toggleSelectAll($event)"
                                class="rounded text-[#0A2C6C] focus:ring-[#0A2C6C]">
                        </th>
                        <!-- Title Column -->
                        <th class="py-3 px-2 text-left whitespace-nowrap min-w-[150px]">
                            <div class="flex items-center space-x-1 cursor-pointer">
                                <span>Title</span>
                            </div>
                        </th>
                        <!-- Visibility Column -->
                        <th class="py-3 px-2 text-left whitespace-nowrap min-w-[100px]">Visibility</th>
                        <!-- Content Column -->
                        <th class="py-3 px-2 text-left whitespace-nowrap min-w-[150px]">Content</th>
                        <!-- Updated Column -->
                        <th class="py-3 px-2 text-left whitespace-nowrap min-w-[150px]">Updated</th>
                        <!-- View Toggles Column -->
                        <th class="py-3 px-2 text-right whitespace-nowrap min-w-[100px]">
                            <div class="flex items-center justify-end space-x-2">
                                <!-- Grid View -->
                                <button class="text-gray-400 hover:text-gray-700">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                                    </svg>
                                </button>
                                <!-- List View (Active) -->
                                <button class="text-[#0A2C6C]">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round"
                                            d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                                    </svg>
                                </button>
                            </div>
                        </th>
                    </tr>
                </thead>
                <!-- Table Body -->
                <tbody class="divide-y divide-gray-200 text-gray-700">
                    <tr *ngFor="let page of storePages" class="hover:bg-gray-50 transition-colors">
                        <!-- Checkbox Column -->
                        <td class="py-3 px-4 whitespace-nowrap">
                            <input type="checkbox" [(ngModel)]="page.selected"
                                class="rounded text-[#0A2C6C] focus:ring-[#0A2C6C]">
                        </td>
                        <!-- Title Column -->
                        <td class="py-3 px-2 font-medium text-gray-900 whitespace-nowrap">
                            {{ page.title }}
                        </td>
                        <!-- Visibility Column -->
                        <td class="py-3 px-2 whitespace-nowrap">
                            <span [ngClass]="getVisibilityClass(page.visibility)"
                                class="text-xs font-medium px-3 py-1 rounded-full flex items-center w-fit">
                                <svg *ngIf="page.visibility === 'Visible'" xmlns="http://www.w3.org/2000/svg"
                                    class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg *ngIf="page.visibility === 'Active'" xmlns="http://www.w3.org/2000/svg"
                                    class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                    stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                {{ page.visibility }}
                            </span>
                        </td>
                        <!-- Content Column -->
                        <td class="py-3 px-2 whitespace-nowrap text-gray-500">
                            {{ page.content }}
                        </td>
                        <!-- Updated Column -->
                        <td class="py-3 px-2 whitespace-nowrap text-gray-700">
                            {{ page.updated }}
                        </td>
                        <!-- Empty last column for alignment -->
                        <td class="py-3 px-2"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination Footer (Made responsive to stack on mobile) -->
    <div
        class="flex flex-col sm:flex-row justify-between items-center mt-6 text-sm text-gray-700 space-y-3 sm:space-y-0">
        <!-- Selection Info -->
        <span class="font-medium order-2 sm:order-none">
            {{ selectedCount }} of {{ totalRows }} row(s) selected.
        </span>

        <!-- Pagination Controls (Stacked on mobile) -->
        <div class="flex flex-col sm:flex-row items-center space-y-3 sm:space-y-0 sm:space-x-6 order-1 sm:order-none">
            <!-- Rows per page -->
            <div class="flex items-center space-x-2">
                <span>Rows per page</span>
                <select [(ngModel)]="rowsPerPage"
                    class="border border-gray-300 rounded-md py-1 px-2 text-sm focus:ring-[#0A2C6C] focus:border-[#0A2C6C]">
                    <option [ngValue]="8">8</option>
                    <option [ngValue]="10">10</option>
                    <option [ngValue]="25">25</option>
                </select>
            </div>

            <!-- Page Info -->
            <span>Page {{ currentPage }} of {{ totalPages }}</span>

            <!-- Navigation Buttons -->
            <div class="flex space-x-1">
                <button class="text-gray-400 hover:text-[#0A2C6C] disabled:opacity-50" [disabled]="currentPage === 1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                    </svg>
                </button>
                <button class="text-gray-400 hover:text-[#0A2C6C] disabled:opacity-50" [disabled]="currentPage === 1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <button class="text-gray-700 hover:text-[#0A2C6C] disabled:opacity-50"
                    [disabled]="currentPage === totalPages">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <button class="text-gray-700 hover:text-[#0A2C6C] disabled:opacity-50"
                    [disabled]="currentPage === totalPages">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
