<div class="w-full mx-auto px-5 lg:px-10 xl:px-20 py-5 lg:py-8">
  <!-- Title section -->
  <h2
    class="capitalize text-xl/tight sm:text-2xl/tight md:text-3xl/tight lg:text-4xl/tight xl:text-5xl/tight font-normal text-center text-08503f">
    Blog</h2>
  <p class="text-xs sm:text-sm md:text-base lg:text-lg xl:text-xl 2xl:text-[21px] text-9d9b9b text-center mt-0.5">
    Discover trends, styling tips, and the stories behind our creations.
  </p>

  <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 sm:gap-2.5 md:gap-3 lg:gap-5 mt-6 lg:mt-8 xl:mt-10">

    <a [routerLink]="blog.link" *ngFor="let blog of blogs">
      <div class="relative w-full block mb-2 overflow-hidden rounded-lg group">
        <!-- Image -->
        <div class="overflow-hidden rounded-lg">
          <img class="w-full object-cover transition-transform duration-500 ease-in-out group-hover:scale-110"
            [src]="blog.image" [alt]="blog.alt" />
        </div>
        <div
          class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-500 ease-in-out flex flex-col justify-end p-4">
        </div>
      </div>
      <p class="text-9d9b9b font-normal text-[10px] md:text-xs lg:text-sm uppercase font-oldstandtt text-end">{{
        blog.date }}</p>
      <p
        class="font-semibold text-1e1e1e text-[11px] sm:text-sm md:text-base lg:text-lg xl:text-[21px] my-2 lg:my-4 text-end line-clamp-2">
        {{ blog.title }}</p>
      <p class="text-9d9b9b font-normal text-[10px] md:text-xs lg:text-sm capitalize underline text-end">Read</p>
    </a>
  </div>
</div>
