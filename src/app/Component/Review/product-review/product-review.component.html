    </div>

  <!-- Reviews Slider -->
  <div class="relative mt-5 lg:mt-8 xl:mt-10">

    <div class="absolute left-0 lg:-left-4 xl:-left-10 top-1/2 -translate-y-1/2 z-10">
      <button
        class="cursor-pointer swiper-review-next size-7 sm:size-9 flex items-center justify-center text-xl sm:text-2xl bg-white text-08503f hover:shadow-md hover:bg-white border border-gray-300 rounded-full p-1">

        </svg>
      </button>
    </div>

      <button
        class="cursor-pointer swiper-review-prev size-7 sm:size-9 flex items-center justify-center text-xl sm:text-2xl bg-white text-08503f hover:shadow-md hover:bg-white border border-gray-300 rounded-full p-1">
        <svg class="w-[6px] lg:w-[10px]" viewBox="0 0 14 25" fill="none" xmlns="http://www.w3.org/2000/svg">

            d="M2.77419 1.30355L13.6452 11.6388C13.7742 11.7618 13.8654 11.8951 13.9187 12.0387C13.9729 12.1822 14 12.336 14 12.5001C14 12.6641 13.9729 12.8179 13.9187 12.9615C13.8654 13.105 13.7742 13.2383 13.6452 13.3613L2.77419 23.7273C2.47312 24.0144 2.09677 24.158 1.64516 24.158C1.19355 24.158 0.806452 24.0042 0.483871 23.6966C0.16129 23.389 0 23.0301 0 22.62C0 22.2098 0.16129 21.851 0.483871 21.5434L9.96774 12.5001L0.483871 3.45673C0.182796 3.16964 0.0322571 2.8161 0.0322571 2.39613C0.0322571 1.97534 0.193548 1.61115 0.516129 1.30355C0.838709 0.995955 1.21505 0.842157 1.64516 0.842157C2.07527 0.842157 2.45161 0.995955 2.77419 1.30355Z"

    <swiper-container #swiperRef init="false">
      <!-- review card -->
      <swiper-slide *ngFor="let review of reviews" class="py-1 px-1">
        <div
          class="bg-white border border-c09d0d p-4 xl:p-8 rounded-md h-full flex flex-col justify-between sm:min-h-[230px] lg:min-h-[250px] xl:min-h-[285px]">
          <div>
            <div class="flex items-start justify-between gap-2 sm:gap-2.5 md:gap-3 mb-4">
              <!-- user icon , name, rating -->
              <div class="flex items-center justify-start gap-2 lg:gap-3 mb-4 sm:mb-0">
                <div class="bg-c09d0d rounded-full size-10 lg:size-14 xl:size-16 flex items-center justify-center">
                  <svg fill="#fff" class="size-6 lg:size-10 xl:size-12 icon flat-color" viewBox="0 0 24 24" id="user-3"
                    data-name="Flat Color" xmlns="http://www.w3.org/2000/svg">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                      <path id="primary"
                        d="M21,20a2,2,0,0,1-2,2H5a2,2,0,0,1-2-2,8,8,0,0,1,1.79-5,2,2,0,0,1,2.67-.39,8.07,8.07,0,0,0,9.07,0,2,2,0,0,1,2.68.39A8,8,0,0,1,21,20Zm-9-6A6,6,0,1,0,6,8,6,6,0,0,0,12,14Z"
                        style="fill: #fff;"></path>
                    </g>
                  </svg>
                </div>
                <!-- user name & rating -->
                <div>
                  <p
                    class="font-normal text-[15px] md:text-base lg:text-lg xl:text-[22px] text-1e1e1e font-oldstandtt capitalize mb-0.5 lg:mb-1">
                    {{ review.name }}</p>
                  <img [src]="review.rating" [alt]="review.alt" class="w-20 lg:w-24 xl:w-28" />
                </div>
              </div>
              <!-- review uploaded images -->
              <div class="flex items-start flex-wrap gap-2">
                <ng-container *ngFor="let img of review.images.slice(0, 2); let i = index">
                  <div class="relative w-10 h-10 lg:w-20 lg:h-20">
                    <img [src]="img" alt="review image"
                      class="w-full h-full object-cover border border-eee rounded-md cursor-pointer"
                      (click)="openImageModal(review.images, i)" />

                    <!-- +X overlay -->
                    <div *ngIf="i === 1 && review.images.length > 2"
                      class="absolute inset-0 bg-black/50 flex items-center justify-center rounded-md text-white font-semibold text-sm cursor-pointer"
                      (click)="openImageModal(review.images, i)">
                      +{{ review.images.length - 2 }}
                    </div>
                  </div>
                </ng-container>
              </div>
            </div>
            <p
              class="text-9d9b9b font-normal text-sm md:text-base xl:text-lg font-oldstandtt line-clamp-7  xl:line-clamp-5">
              {{ review.text }}</p>
          </div>
        </div>
      </swiper-slide>
    </swiper-container>

  </div>
</div>

<app-review-popup #reviewPopup></app-review-popup>

<!-- Image Zoom Modal -->
<div *ngIf="isImageModalOpen" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90">
  <div class="relative w-full max-w-6xl">
    <!-- Close Button -->
    <button (click)="closeImageModal()"
      class="absolute top-3 right-3 text-white bg-black/40 hover:bg-black/70 rounded-full p-2 z-50">
      ✕
    </button>

    <!-- Swiper with Zoom -->
    <swiper-container class="w-full h-[80vh]" [zoom]="true" [navigation]="true" [pagination]="{ clickable: true }"
      [initialSlide]="activeImageIndex" [centeredSlides]="true" [spaceBetween]="10" [loop]="true">
      <swiper-slide *ngFor="let img of modalImages">
        <div class="swiper-zoom-container flex items-center justify-center">
          <img [src]="img" class="object-contain max-h-[80vh] w-auto" />
        </div>
      </swiper-slide>
    </swiper-container>
  </div>
</div>
