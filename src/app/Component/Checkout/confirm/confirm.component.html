
<div class="w-full lg:flex items-start gap-4">
  <div class="w-full lg:w-2/3">
    <div class="w-full rounded-md px-4 sm:px-10 md:px-4 lg:px-8 xl:px-10">
      <div class="border-b border-gray-300 ">
        <div class="flex items-center justify-between gap-2 mt-4">
          <p class="text-lg lg:text-xl xl:text-2xl text-08503f font-medium font-oldstandtt">Shipping Address</p>
          <p (click)="goBackInfo()"
            class="font-normal text-[#305CDE] text-sm md:text-base lg:text-lg underline cursor-pointer">Change</p>
        </div>
        <div class="my-3 lg:my-4 space-y-0.5">
          <p class="text-sm lg:text-base font-normal text-9d9b9b">Ayushi Sharma, 125, Dharamshala, Lane 4</p>
          <p class="text-sm lg:text-base font-normal text-9d9b9b">New Delhi, 110059</p>
          <p class="text-sm lg:text-base font-normal text-9d9b9b">India</p>
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between gap-2 mt-4">
          <p class="text-lg lg:text-xl xl:text-2xl text-08503f font-medium font-oldstandtt">Payment Method</p>
          <p (click)="goBackShip()"
            class="font-normal text-[#305CDE] text-sm md:text-base lg:text-lg underline cursor-pointer">Change</p>
        </div>
        <div class="my-3 lg:my-4 space-y-0.5">
          <p class="text-sm lg:text-base font-normal text-9d9b9b">Credit/Debit Card</p>
        </div>
      </div>
    </div>
  </div>
  <div class="w-full lg:w-1/3">
    <app-order-summary (continue)="goNext()"></app-order-summary>
  </div>
</div>
