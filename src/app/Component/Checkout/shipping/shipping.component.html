<div class="w-full lg:flex items-start gap-4">
  <div class="w-full lg:w-2/3">
    <div class="w-full rounded-md px-4 sm:px-10 md:px-4 lg:px-8 xl:px-10">
       <!-- back to information -->
    <button (click)="previous()" class="cursor-pointer w-max text-1e1e1e underline hover:text-9d9b9b text-sm md:text-base lg:text-lg mb-4 capitalize">Back to information</button>

       <p class="text-lg lg:text-xl xl:text-2xl text-08503f font-medium font-oldstandtt">Payment Option</p>
        <div class="space-y-8 mt-6">
          <!-- Option 1 (default checked) -->
          <div>
            <label class="inline-flex items-center">
              <input type="radio" name="gender" value="male" class="form-radio h-5 w-5 text-green-500" checked>
              <span class="ml-2 text-1e1e1e text-sm md:text-base lg:text-base xl:text-lg">Credit/Debit Card</span>
            </label>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-2">
              <div class="col-span-2">
                <div class="relative">
            <input type="text"
              class="block px-2.5 pb-2 pt-3 w-full text-sm md:text-[15px] text-1e1e1e placeholder:text-9d9b9b bg-white rounded-md border-1 border-9d9b9b appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
              placeholder=" " />
            <label
              class="absolute text-sm md:text-base text-9d9b9b duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Card Number</label>
          </div>
              </div>

              <div class="col-span-1 ">
                <div class="relative">
                  <input type="date"
                    class="block px-2.5 pb-2 pt-3 w-full text-sm md:text-[15px] text-1e1e1e placeholder:text-9d9b9b bg-white rounded-md border-1 border-9d9b9b appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
                    placeholder=" " />
                  <label
                    class="absolute text-sm md:text-base text-9d9b9b duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Expiry</label>
                </div>
              </div>

              <div class="col-span-1 ">
                <div class="relative">
            <input type="text"
              class="block px-2.5 pb-2 pt-3 w-full text-sm md:text-[15px] text-1e1e1e placeholder:text-9d9b9b bg-white rounded-md border-1 border-9d9b9b appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
              placeholder=" " />
            <label
              class="absolute text-sm md:text-base text-9d9b9b duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">CVV</label>
          </div>
              </div>
            </div>
          </div>
          <!-- Option 2 -->
          <div>
            <label class="inline-flex items-center">
              <input type="radio" name="gender" value="male" class="form-radio h-5 w-5 text-green-500">
              <span class="ml-2 text-1e1e1e text-sm md:text-base lg:text-base xl:text-lg">UPI / Wallets</span>
            </label>
            <div class="w-full flex items-center mt-2 border-1 border-9d9b9b bg-white rounded-md">
              <div class="relative w-1/2 lg:w-2/3">
                <input type="text"
                  class="block px-2.5 pb-2 pt-3 w-full text-sm md:text-[15px] text-1e1e1e placeholder:text-9d9b9b bg-white rounded-md appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
                  placeholder=" " />
                <label
                  class="absolute text-sm md:text-base text-9d9b9b duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2 peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Card
                  Number</label>
              </div>
              <div class=" w-1/2 lg:w-1/3 flex items-center justify-end gap-1.5 py-3.5 lg:py-2 px-3">
                <a routerLink="#"><img class="w-10" src="/assets/images/home/card1.png" alt="card"></a>
                <a routerLink="#"><img class="w-10" src="/assets/images/home/card2.png" alt="card"></a>
                <a routerLink="#"><img class="w-10" src="/assets/images/home/card3.png" alt="card"></a>
                <a routerLink="#"><img class="w-10" src="/assets/images/home/card4.png" alt="card"></a>
                <a routerLink="#"><img class="w-10" src="/assets/images/home/card5.png" alt="card"></a>
              </div>
            </div>

          </div>

          <!-- Option 3 -->
          <div>
            <label class="inline-flex items-center">
              <input type="radio" name="gender" value="male" class="form-radio h-5 w-5 text-green-500">
              <span class="ml-2 text-1e1e1e text-sm md:text-base lg:text-base xl:text-lg">Net Banking</span>
            </label>
            <div class="relative mt-2">
              <select
                class="block px-2.5 pb-2 pt-3 w-full text-sm md:text-[15px] text-1e1e1e placeholder:text-9d9b9b bg-white rounded-md border-1 border-9d9b9b focus:outline-none focus:ring-0 focus:border-08503f peer">
                <option value="" disabled selected>Select Bank</option>
                <option value="maharashtra">State Bank Of India</option>
                <option value="karnataka">Axis Bank</option>
              </select>

              <label class="absolute text-base text-9d9b9b duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2
           peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2
           peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 start-1">
                Bank
              </label>
            </div>
          </div>
        </div>
    </div>
  </div>
  <div class="w-full lg:w-1/3">
    <app-order-summary (continue)="goNext()"></app-order-summary>
  </div>
</div>
